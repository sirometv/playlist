name: Extract YouTube Live M3U8

on:
  schedule:
    - cron: '*/30 * * * *'  # প্রতি 30 মিনিটে আপডেট হবে
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Create YT folder
      run: mkdir -p YT

    - name: Extract m3u8 from YouTube Live
      run: |
        python3 << 'EOF'
        import subprocess
        import json
        import re

        # এখানে আপনার চ্যানেলের তথ্য দিন
        channels = [
            {
                "name": "SOMOY TV",
                "url": "https://www.youtube.com/watch?v=23gFzkBnNrM",
                "logo": "https://i.imgur.com/somoy_tv_logo.png",  # আপনার লোগো URL দিন
                "group": "News"
            }
        ]

        # M3U প্লেলিস্ট শুরু
        m3u_content = '#EXTM3U\n'
        m3u_content += '# Playlist generated by GitHub Actions\n'
        m3u_content += f'# Updated: {subprocess.run(["date", "-u"], capture_output=True, text=True).stdout.strip()}\n\n'

        success_count = 0
        
        for ch in channels:
            print(f"🔍 Processing: {ch['name']}")
            print(f"📺 URL: {ch['url']}")
            
            try:
                # yt-dlp দিয়ে m3u8 লিংক বের করা
                result = subprocess.run(
                    ['yt-dlp', '-g', '-f', 'best', ch['url']],
                    capture_output=True,
                    text=True,
                    timeout=60
                )
                
                if result.returncode == 0 and result.stdout.strip():
                    m3u8_url = result.stdout.strip()
                    print(f"✅ Success! Got m3u8: {m3u8_url[:100]}...")
                    
                    # M3U এন্ট্রি তৈরি
                    m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch["group"]}", {ch["name"]}\n'
                    m3u_content += f'{m3u8_url}\n'
                    success_count += 1
                else:
                    print(f"❌ Failed: yt-dlp returned no output")
                    
            except subprocess.TimeoutExpired:
                print(f"⏰ Timeout for {ch['name']}")
            except Exception as e:
                print(f"⚠️ Error: {str(e)}")
            
            print("---")
        
        # প্লেলিস্ট ফাইলে লেখা
        with open('YT/YT.m3u', 'w', encoding='utf-8') as f:
            f.write(m3u_content)
        
        print(f"\n✅ Successfully processed {success_count}/{len(channels)} channels")
        
        # কাঁচা m3u8 লিংকও আলাদা ফাইলে সংরক্ষণ
        with open('YT/raw_urls.txt', 'w') as f:
            for ch in channels:
                try:
                    result = subprocess.run(['yt-dlp', '-g', '-f', 'best', ch['url']], capture_output=True, text=True, timeout=60)
                    if result.returncode == 0:
                        f.write(f"{ch['name']}: {result.stdout.strip()}\n")
                except:
                    f.write(f"{ch['name']}: FAILED\n")
        
        EOF

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add YT/YT.m3u YT/raw_urls.txt
        git diff --cached --quiet || git commit -m "🔄 Update YouTube live streams [skip ci]"
        git push
