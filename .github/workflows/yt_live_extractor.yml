name: Extract YouTube Live M3U8 (Force Push)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: pip install yt-dlp

    - name: Create YT folder
      run: mkdir -p YT

    - name: Extract m3u8
      run: |
        python3 << 'EOF'
        import subprocess
        
        channels = [
            {
                "name": "SOMOY TV",
                "url": "https://www.youtube.com/watch?v=23gFzkBnNrM",
                "logo": "https://i.imgur.com/somoy_tv_logo.png",
                "group": "News"
            }
        ]
        
        m3u_content = '#EXTM3U\n'
        
        for ch in channels:
            try:
                result = subprocess.run(['yt-dlp', '-g', '-f', 'best', ch['url']], capture_output=True, text=True, timeout=60)
                if result.returncode == 0 and result.stdout.strip():
                    m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch["group"]}", {ch["name"]}\n'
                    m3u_content += f'{result.stdout.strip()}\n'
                    print(f"✅ {ch['name']} - Success")
                else:
                    print(f"❌ {ch['name']} - Failed")
            except Exception as e:
                print(f"⚠️ {ch['name']} - Error: {e}")
        
        with open('YT/YT.m3u', 'w') as f:
            f.write(m3u_content)
        EOF

    - name: Force push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add YT/YT.m3u
        git commit -m "🔄 Force update YT.m3u [skip ci]" || echo "No changes"
        git push origin main --force  # 👈 force push ব্যবহার করা হয়েছে
