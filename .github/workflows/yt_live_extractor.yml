name: YouTube Live to M3U8 Extractor

on:
  schedule:
    # প্রতি 6 ঘণ্টা পর পর আপডেট হবে (আপনার প্রয়োজনমতো সময় দিন)
    - cron: '*/360 * * * *'
  workflow_dispatch:  # ম্যানুয়ালি রান করার সুবিধা

jobs:
  extract-m3u8:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Create YT folder if not exists
      run: mkdir -p YT

    - name: Extract m3u8 Links and Generate Playlist
      id: extract
      run: |
        # এখানে আপনার চ্যানেলগুলোর তথ্য JSON আকারে দিন
        cat > channels.json << 'EOF'
        [
          {
            "name": "SOMOY TV",
            "url": "https://www.youtube.com/watch?v=23gFzkBnNrM",
            "logo": "https://example.com/somoy_tv_logo.png",
            "group": "News"
          },
          {
            "name": "Channel Name 2",
            "url": "https://www.youtube.com/watch?v=SECOND_CHANNEL_ID",
            "logo": "https://example.com/logo2.png",
            "group": "Entertainment"
          }
        ]
        EOF
        
        # Python স্ক্রিপ্ট যা m3u8 লিংক বের করবে
        python3 - << 'PYSCRIPT'
        import json
        import subprocess
        import re
        
        def extract_m3u8(youtube_url):
            """yt-dlp ব্যবহার করে m3u8 লিংক বের করা"""
            try:
                result = subprocess.run(
                    ['yt-dlp', '-g', '-f', 'best', youtube_url],
                    capture_output=True, text=True, check=True
                )
                # yt-dlp সরাসরি m3u8 লিংক দেয়
                return result.stdout.strip()
            except subprocess.CalledProcessError:
                return None
        
        # JSON ফাইল থেকে চ্যানেলের তথ্য পড়া
        with open('channels.json', 'r', encoding='utf-8') as f:
            channels = json.load(f)
        
        # M3U প্লেলিস্ট জেনারেট করা
        m3u_content = '#EXTM3U\n'
        m3u_content += '# Playlist generated by GitHub Actions\n'
        m3u_content += f'# Updated: {subprocess.run(["date", "-u"], capture_output=True, text=True).stdout.strip()}\n\n'
        
        success_count = 0
        for ch in channels:
            print(f'Processing: {ch["name"]} - {ch["url"]}')
            m3u8_url = extract_m3u8(ch["url"])
            
            if m3u8_url:
                # M3U এন্ট্রি তৈরি
                m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch.get("group", "General")}", {ch["name"]}\n'
                m3u_content += f'{m3u8_url}\n'
                success_count += 1
            else:
                print(f'⚠️ Failed to extract m3u8 for {ch["name"]}')
                # ব্যর্থ চ্যানেলের জন্য একটি ডামি এন্ট্রি (পরে আপডেট হবে)
                m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch.get("group", "General")}", {ch["name"]} (Offline)\n'
                m3u_content += '# https://youtu.be/offline\n'
        
        # প্লেলিস্ট ফাইলে লেখা
        with open('YT/YT.m3u', 'w', encoding='utf-8') as f:
            f.write(m3u_content)
        
        print(f'✅ Successfully processed {success_count}/{len(channels)} channels')
        
        # আউটপুট সেট করা (যদি পরে প্রয়োজন হয়)
        with open('output_summary.txt', 'w') as summary:
            summary.write(f'Total channels: {len(channels)}\nSuccessful: {success_count}')
        
        PYSCRIPT

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add YT/YT.m3u output_summary.txt
        git diff --cached --quiet || git commit -m "🔄 Auto-update YT.m3u playlist [skip ci]"
        git push
