name: Extract YouTube Live M3U8 (Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yt-dlp with dependencies
      run: |
        pip install --upgrade pip
        pip install yt-dlp
        # yt-dlp-এর সর্বশেষ সংস্করণ নিশ্চিত করা
        pip install --upgrade yt-dlp

    - name: Create YT folder
      run: mkdir -p YT

    - name: Debug - Test yt-dlp manually
      run: |
        echo "Testing yt-dlp on SOMOY TV..."
        yt-dlp -g "https://www.youtube.com/watch?v=23gFzkBnNrM" || echo "yt-dlp failed"
        echo "Test completed"

    - name: Extract m3u8 with verbose output
      run: |
        python3 << 'EOF'
        import subprocess
        import sys
        import time

        # চ্যানেলের তথ্য
        channels = [
            {
                "name": "SOMOY TV",
                "url": "https://www.youtube.com/watch?v=23gFzkBnNrM",
                "logo": "https://i.imgur.com/somoy_tv_logo.png",
                "group": "News"
            }
        ]
        
        m3u_content = '#EXTM3U\n'
        m3u_content += '# Playlist generated by GitHub Actions\n'
        m3u_content += f'# Updated: {time.strftime("%Y-%m-%d %H:%M:%S UTC")}\n\n'
        
        success_count = 0
        
        for ch in channels:
            print(f"\n🔍 Processing: {ch['name']}")
            print(f"📺 URL: {ch['url']}")
            
            try:
                # yt-dlp চালানোর আগে কুকি ব্যবহার করার চেষ্টা
                cmd = ['yt-dlp', '-g', '-f', 'best', '--no-check-certificate', ch['url']]
                print(f"Running: {' '.join(cmd)}")
                
                result = subprocess.run(
                    cmd,
                    capture_output=True,
                    text=True,
                    timeout=90
                )
                
                print(f"Return code: {result.returncode}")
                
                if result.returncode == 0:
                    output = result.stdout.strip()
                    if output and 'manifest.googlevideo.com' in output:
                        print(f"✅ SUCCESS! Got m3u8 link")
                        m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch["group"]}", {ch["name"]}\n'
                        m3u_content += f'{output}\n\n'
                        success_count += 1
                    else:
                        print(f"❌ Invalid output format")
                        print(f"Output was: {output[:200] if output else 'EMPTY'}")
                else:
                    print(f"❌ yt-dlp failed with error:")
                    print(result.stderr[:500])
                    
            except subprocess.TimeoutExpired:
                print(f"⏰ Timeout for {ch['name']}")
            except Exception as e:
                print(f"⚠️ Unexpected error: {str(e)}")
        
        # সর্বশেষ আপডেটের সময়সহ ফাইল সেভ করা
        with open('YT/YT.m3u', 'w', encoding='utf-8') as f:
            f.write(m3u_content)
        
        # সাফল্যের হার দেখানো
        print(f"\n{'='*50}")
        print(f"✅ Successfully processed {success_count}/{len(channels)} channels")
        print(f"{'='*50}")
        
        # যদি কোনো চ্যানেল সফল না হয়, তাহলে error exit code দেওয়া
        if success_count == 0:
            print("\n⚠️ WARNING: No channels were successfully processed!")
            print("Possible reasons:")
            print("1. YouTube is blocking the request")
            print("2. The live stream is currently offline")
            print("3. The video ID is incorrect")
            sys.exit(1)
        
        EOF

    - name: Display generated playlist
      run: |
        echo "=== Generated YT.m3u content ==="
        cat YT/YT.m3u
        echo "================================"

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # রিমোট থেকে আপডেট নেওয়া
        git pull origin main --rebase || true
        
        # পরিবর্তন যোগ করা
        git add YT/YT.m3u
        
        # চেক করা পরিবর্তন আছে কিনা
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Update YT.m3u playlist [skip ci]"
          git push origin main
        fi
