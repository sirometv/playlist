name: Extract YouTube Live M3U8

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # সম্পূর্ণ ইতিহাস fetch করবে

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Create YT folder
      run: mkdir -p YT

    - name: Extract m3u8 from YouTube Live
      run: |
        python3 << 'EOF'
        import subprocess
        import json
        import re
        import sys

        # এখানে আপনার চ্যানেলের তথ্য দিন
        channels = [
            {
                "name": "SOMOY TV",
                "url": "https://www.youtube.com/watch?v=23gFzkBnNrM",
                "logo": "https://i.imgur.com/somoy_tv_logo.png",
                "group": "News"
            }
        ]

        m3u_content = '#EXTM3U\n'
        m3u_content += '# Playlist generated by GitHub Actions\n'
        m3u_content += f'# Updated: {subprocess.run(["date", "-u"], capture_output=True, text=True).stdout.strip()}\n\n'

        success_count = 0
        
        for ch in channels:
            print(f"🔍 Processing: {ch['name']}")
            
            try:
                result = subprocess.run(
                    ['yt-dlp', '-g', '-f', 'best', ch['url']],
                    capture_output=True,
                    text=True,
                    timeout=60
                )
                
                if result.returncode == 0 and result.stdout.strip():
                    m3u8_url = result.stdout.strip()
                    print(f"✅ Success! Got m3u8")
                    
                    m3u_content += f'#EXTINF:-1 tvg-id="{ch["name"]}" tvg-name="{ch["name"]}" tvg-logo="{ch["logo"]}" group-title="{ch["group"]}", {ch["name"]}\n'
                    m3u_content += f'{m3u8_url}\n'
                    success_count += 1
                else:
                    print(f"❌ Failed for {ch['name']}")
                    
            except Exception as e:
                print(f"⚠️ Error: {str(e)}")
        
        with open('YT/YT.m3u', 'w', encoding='utf-8') as f:
            f.write(m3u_content)
        
        print(f"\n✅ Processed {success_count}/{len(channels)} channels")
        EOF

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # প্রথমে রিমোট থেকে latest changes নেওয়া
        git pull --rebase origin main || true
        
        # পরিবর্তনগুলো যোগ করা
        git add YT/YT.m3u YT/raw_urls.txt 2>/dev/null || true
        
        # পরিবর্তন থাকলে commit করা
        if ! git diff --cached --quiet; then
          git commit -m "🔄 Update YouTube live streams [skip ci]"
          # force push না করে normal push
          git push origin main
        else
          echo "No changes to commit"
        fi
